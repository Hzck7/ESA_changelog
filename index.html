<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal des versions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --ink: #111114;
    --muted: #6b7078;
    --faint: #9a9ea5;
    --line: #e8e8ea;
    --accent: #3452eb;
    --accent-soft: #eef1fd;

    --dot-added: #1f9d55;
    --dot-fixed: #d64545;
    --dot-changed: #6b7078;
    --dot-security: #c2790f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 88px 24px 140px;
  }

  header.page-head {
    margin-bottom: 72px;
  }

  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    margin-bottom: 24px;
    transition: all 0.15s ease;
  }

  .nav-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-weight: 700;
    font-size: 34px;
    margin: 0 0 14px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15.5px;
    max-width: 50ch;
  }

  .since-note {
    font-size: 13.5px;
    color: var(--ink);
    background: var(--accent-soft);
    border-left: 2px solid var(--accent);
    padding: 10px 16px;
    margin: 0 0 48px;
  }

  .since-note strong { font-weight: 600; }

  /* Entries */
  .timeline {
    display: flex;
    flex-direction: column;
  }

  .entry {
    padding: 36px 0;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: 128px 1fr;
    gap: 28px;
  }

  .entry:first-child { border-top: none; padding-top: 0; }
  .entry.older { display: none; }

  .meta-col {
    padding-top: 2px;
  }

  .version-num {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 13.5px;
    color: var(--ink);
    display: block;
  }

  .version-date {
    font-size: 12.5px;
    color: var(--faint);
    margin-top: 3px;
    display: block;
  }

  .badge-new {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  .entry-title {
    font-weight: 600;
    font-size: 17px;
    margin: 0 0 16px;
    letter-spacing: -0.01em;
  }

  ul.changes {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  ul.changes li {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-size: 14px;
    color: var(--ink);
  }

  .dot {
    flex: none;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 2px;
  }

  .dot.added { background: var(--dot-added); }
  .dot.fixed { background: var(--dot-fixed); }
  .dot.changed { background: var(--dot-changed); }
  .dot.security { background: var(--dot-security); }

  .change-text .type-label {
    color: var(--muted);
    font-weight: 500;
  }

  .show-all-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    background: none;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 18px;
    cursor: pointer;
    display: block;
    margin: 8px auto 0;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .show-all-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .empty-state {
    color: var(--faint);
    font-size: 13.5px;
    padding: 8px 0;
  }

  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--faint);
    display: flex;
    justify-content: space-between;
  }

  @media (max-width: 560px) {
    .wrap { padding: 56px 18px 90px; }
    h1 { font-size: 27px; }
    .entry { grid-template-columns: 1fr; gap: 10px; padding: 28px 0; }
    .meta-col { display: flex; align-items: baseline; gap: 10px; }
    .version-date { margin-top: 0; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <a class="nav-link" href="backlog.html">← Backlog</a>
      <div class="eyebrow">Nouveautés</div>
      <h1>Journal des versions</h1>
      <p class="subtitle">L'historique des évolutions de l'application — nouvelles fonctionnalités, corrections et changements, par ordre chronologique.</p>
    </header>

    <p class="since-note" id="since-note" style="display:none;"></p>

    <div class="timeline" id="timeline"></div>

    <button class="show-all-btn" id="show-all-btn" style="display:none;">Afficher l'historique complet</button>

    <footer>
      <span>Mis à jour automatiquement</span>
      <span id="footer-date"></span>
    </footer>
  </div>

<script>
  const tagLabels = { added: "Ajouté", fixed: "Corrigé", changed: "Modifié", security: "Sécurité" };

  function formatDate(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
  }

  function parseVersion(v) {
    if (!v) return null;
    const clean = v.trim().replace(/^v/i, "");
    const parts = clean.split(".").map(n => parseInt(n, 10));
    return parts.every(n => !isNaN(n)) ? parts : null;
  }

  function versionGreaterThan(a, b) {
    const pa = parseVersion(a), pb = parseVersion(b);
    if (!pa || !pb) return false;
    const len = Math.max(pa.length, pb.length);
    for (let i = 0; i < len; i++) {
      const x = pa[i] || 0, y = pb[i] || 0;
      if (x > y) return true;
      if (x < y) return false;
    }
    return false;
  }

  const params = new URLSearchParams(window.location.search);
  const sinceVersion = params.get("since");
  const timeline = document.getElementById("timeline");

  function renderEntry(entry, isNew) {
    const el = document.createElement("div");
    el.className = "entry" + (isNew ? "" : " older");
    el.innerHTML = `
      <div class="meta-col">
        <span class="version-num">${entry.version}</span>
        <span class="version-date">${formatDate(entry.date)}</span>
        ${(isNew && sinceVersion) ? '<span class="badge-new">Nouveau</span>' : ""}
      </div>
      <div>
        <h2 class="entry-title">${entry.title}</h2>
        <ul class="changes">
          ${entry.changes.map(c => `
            <li>
              <span class="dot ${c.type}"></span>
              <span class="change-text"><span class="type-label">${tagLabels[c.type] || c.type} —</span> ${c.text}</span>
            </li>
          `).join("")}
        </ul>
      </div>
    `;
    timeline.appendChild(el);
  }

  function renderChangelog(changelog) {
    const newEntries = [];
    const olderEntries = [];

    changelog.forEach(entry => {
      if (sinceVersion && !versionGreaterThan(entry.version, sinceVersion)) {
        olderEntries.push(entry);
      } else {
        newEntries.push(entry);
      }
    });

    if (sinceVersion && newEntries.length === 0) {
      document.getElementById("since-note").style.display = "block";
      document.getElementById("since-note").innerHTML =
        "Aucune nouveauté depuis votre dernière visite (<strong>" + sinceVersion + "</strong>).";
      olderEntries.forEach(entry => renderEntry(entry, true));
    } else {
      if (sinceVersion) {
        document.getElementById("since-note").style.display = "block";
        document.getElementById("since-note").innerHTML =
          "Nouveautés depuis votre version <strong>" + sinceVersion + "</strong> :";
      }
      newEntries.forEach(entry => renderEntry(entry, true));
      olderEntries.forEach(entry => renderEntry(entry, false));

      if (olderEntries.length > 0) {
        const btn = document.getElementById("show-all-btn");
        btn.style.display = "block";
        btn.addEventListener("click", () => {
          document.querySelectorAll(".entry.older").forEach(el => el.classList.remove("older"));
          btn.style.display = "none";
        });
      }
    }

    document.getElementById("footer-date").textContent =
      "Dernière version : " + changelog[0].version;
  }

  fetch("data.json")
    .then(r => {
      if (!r.ok) throw new Error("Impossible de charger data.json (" + r.status + ")");
      return r.json();
    })
    .then(data => renderChangelog(data.changelog))
    .catch(err => {
      timeline.innerHTML = `<p class="empty-state">Impossible de charger le changelog (${err.message}). Vérifiez que data.json est présent à côté de cette page et servi via HTTP.</p>`;
      console.error(err);
    });
</script>
</body>
</html>
